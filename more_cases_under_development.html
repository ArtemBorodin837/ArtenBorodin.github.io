<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Більше кейсів — в розробці</title>
  <style>
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color:#0f172a;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
      box-sizing:border-box;
    }
    .card{
      max-width:640px;
      width:100%;
      background:#fff;
      border:1px solid rgba(15,23,42,.10);
      border-radius:24px;
      padding:32px;
      box-shadow:0 18px 40px rgba(15,23,42,.08);
      text-align:center;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(30px, 5vw, 46px);
      letter-spacing:-.03em;
    }
    p{
      margin:0 0 20px;
      color:#475569;
      font-size:18px;
      line-height:1.6;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 18px;
      border-radius:14px;
      border:1px solid #0f172a;
      background:#0f172a;
      color:#fff;
      font-weight:700;
      text-decoration:none;
      white-space:nowrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Сторінка в розробці</h1>
    <p>Тут будуть розміщені додаткові кейси. Сторінка готується.</p>
    <a class="btn" href="index.html">Назад</a>
  </div>
</body>
</html>
